services:
  postgres:
    image: postgres:17
    ports: ["${POSTGRES_PORT:-5432}:5432"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-soma}
      POSTGRES_USER: ${POSTGRES_USER:-soma}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-soma}
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports: ["${REDIS_PORT:-6379}:6379"]

  mongodb:
    image: mongo:7
    ports: ["${MONGODB_PORT:-27017}:27017"]
    volumes:
      - mongodata:/data/db

  mysql:
    image: mysql:8
    ports: ["${MYSQL_PORT:-3306}:3306"]
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-soma}
      MYSQL_USER: ${MYSQL_USER:-soma}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-soma}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - mysqldata:/var/lib/mysql

  minio:
    image: minio/minio:latest
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data

  minio-init:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: >
      sh -c "
        sleep 2 &&
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
        mc mb --ignore-existing local/${SOMA_S3_DEFAULT_BUCKET:-soma-uploads}
      "

  # Uncomment to enable Elasticsearch
  # elasticsearch:
  #   image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
  #   ports: ["${ELASTICSEARCH_PORT:-9200}:9200"]
  #   environment:
  #     discovery.type: single-node
  #     xpack.security.enabled: "false"
  #     ES_JAVA_OPTS: "-Xms256m -Xmx256m"
  #   volumes:
  #     - esdata:/var/lib/elasticsearch/data

  mailcatcher:
    image: sj26/mailcatcher:latest
    ports:
      - "${SMTP_PORT:-1025}:1025"
      - "${SMTP_WEB_PORT:-1080}:1080"

volumes:
  pgdata:
  mongodata:
  mysqldata:
  miniodata:
  # esdata:
