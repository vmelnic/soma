<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8">
<title>Tiny Kitchen — SOMA ML10</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: { colors: {
    soma: { bg: '#0f0f1a', panel: '#161625', surface: '#1c1c30', accent: '#00d4ff', danger: '#e94560', ok: '#4caf50' },
  }}}
}
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  body { font-family: 'Inter', system-ui, sans-serif; }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  .cell { transition: background-color 0.3s, border-color 0.3s, box-shadow 0.3s; }
  .cell.active { box-shadow: 0 0 0 2px rgba(0,212,255,0.4); }
  .cell.changed { animation: pulse 0.5s ease-out; }
  @keyframes pulse { 0% { transform: scale(1.05); } 100% { transform: scale(1); } }
  .arm-marker { transition: left 0.4s ease, top 0.4s ease; }
</style>
</head>
<body class="h-full bg-soma-bg text-gray-200 overflow-hidden">
<div class="h-full flex flex-col">

  <header class="flex items-center justify-between px-5 py-2.5 bg-soma-panel border-b border-white/5">
    <div class="flex items-center gap-3">
      <div class="w-7 h-7 rounded-lg bg-soma-accent/20 flex items-center justify-center">
        <svg class="w-3.5 h-3.5 text-soma-accent" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
      </div>
      <h1 class="text-sm font-semibold text-white">SOMA <span class="text-soma-accent">Tiny Kitchen</span></h1>
      <span class="text-[10px] px-1.5 py-0.5 rounded-full bg-soma-accent/10 text-soma-accent font-medium">ML10</span>
    </div>
    <div id="header-status" class="text-xs text-gray-500">Ready</div>
  </header>

  <div class="flex-1 flex min-h-0">

    <!-- LEFT -->
    <aside class="w-56 bg-soma-panel border-r border-white/5 flex flex-col overflow-y-auto shrink-0">
      <div class="p-4 space-y-4 border-b border-white/5">
        <div class="space-y-1.5">
          <label class="text-[10px] font-medium uppercase tracking-wider text-gray-500">Seed</label>
          <input type="number" id="seed" value="42" min="1" max="9999"
            class="w-full bg-soma-surface border border-white/10 rounded-md px-3 py-1.5 text-sm text-white focus:outline-none focus:border-soma-accent/50">
        </div>
        <div class="space-y-1.5">
          <label class="text-[10px] font-medium uppercase tracking-wider text-gray-500">Speed</label>
          <div class="flex items-center gap-2">
            <input type="range" id="speed" min="1" max="10" value="5" class="flex-1 accent-soma-accent h-1">
            <span id="speed-label" class="text-xs text-gray-400 w-4 text-right">5</span>
          </div>
        </div>
        <div class="flex gap-2">
          <button id="btn-play" onclick="runScenario()"
            class="flex-1 py-2 px-3 rounded-md bg-soma-accent text-black text-xs font-semibold hover:bg-soma-accent/80 disabled:bg-gray-700 disabled:text-gray-500 disabled:cursor-not-allowed transition">Play</button>
          <button onclick="flushMemory()"
            class="py-2 px-3 rounded-md bg-soma-danger/20 text-soma-danger text-xs font-semibold hover:bg-soma-danger/30 transition">Flush</button>
        </div>
      </div>
      <div class="p-4 space-y-2 border-b border-white/5">
        <h3 class="text-[10px] font-medium uppercase tracking-wider text-gray-500">ML10 Tasks</h3>
        <div class="space-y-0.5" id="tasks-grid"></div>
      </div>
    </aside>

    <!-- MIDDLE — Top-down kitchen grid -->
    <main class="flex-1 flex items-center justify-center bg-[#0a0a14] min-w-0 p-4">
      <div id="kitchen" class="relative" style="width:560px; height:190px;">

        <!-- Interactive elements grid -->
        <div class="absolute grid grid-cols-4 gap-3" style="top:8px; left:16px; right:16px;">

          <!-- WINDOW -->
          <div id="el-window" class="cell h-[80px] rounded-lg border-2 border-[#3a5a68] bg-[#1c2830] cursor-pointer flex flex-col items-center justify-center"
               onclick="togglePreview('window')">
            <div class="text-xl">🪟</div>
            <span class="text-[10px] font-semibold text-[#78b8d8]">WINDOW</span>
            <span id="st-window" class="text-[8px] text-gray-500">closed</span>
          </div>

          <!-- DRAWER -->
          <div id="el-drawer" class="cell h-[80px] rounded-lg border-2 border-[#6a4a28] bg-[#2a2218] cursor-pointer flex flex-col items-center justify-center"
               onclick="togglePreview('drawer')">
            <div class="text-xl">🗃</div>
            <span class="text-[10px] font-semibold text-[#b08050]">DRAWER</span>
            <span id="st-drawer" class="text-[8px] text-gray-500">closed</span>
          </div>

          <!-- CABINET (glass) -->
          <div id="el-cabinet" class="cell h-[80px] rounded-lg border-2 border-[#6a5a48] bg-[#2a2418] cursor-pointer flex flex-col items-center justify-center"
               onclick="togglePreview('cabinet')">
            <div class="text-xl">🗄</div>
            <span class="text-[10px] font-semibold text-[#a08060]">CABINET</span>
            <span id="st-cabinet" class="text-[8px] text-gray-500">closed</span>
          </div>

          <!-- PROCESSOR -->
          <div id="el-processor" class="cell h-[80px] rounded-lg border-2 border-[#3a5030] bg-[#1a2218] cursor-pointer flex flex-col items-center justify-center"
               onclick="togglePreview('processor')">
            <div class="text-xl">⚙️</div>
            <span class="text-[10px] font-semibold text-[#80c840]">PROCESSOR</span>
            <span id="st-processor" class="text-[8px] text-gray-500">off</span>
          </div>

          <!-- CUTTING BOARD -->
          <div id="el-board" class="cell h-[80px] rounded-lg border-2 border-[#5a4a32] bg-[#1c1a14] flex flex-col items-center justify-center">
            <div class="text-xl">🪵</div>
            <span class="text-[10px] font-semibold text-[#c4a882]">BOARD</span>
            <span id="st-board" class="text-[8px] text-gray-500">on counter</span>
          </div>

          <!-- SPICE JAR -->
          <div id="el-jar" class="cell h-[80px] rounded-lg border-2 border-[#6a5a10] bg-[#1c1a10] flex flex-col items-center justify-center">
            <div class="text-xl">🫙</div>
            <span class="text-[10px] font-semibold text-[#ffc107]">JAR</span>
            <span id="st-jar" class="text-[8px] text-gray-500">on counter</span>
          </div>

          <!-- KNIFE BLOCK -->
          <div id="el-block" class="cell h-[80px] rounded-lg border-2 border-[#4a4a4a] bg-[#1c1c20] flex flex-col items-center justify-center">
            <div class="text-xl">🔪</div>
            <span class="text-[10px] font-semibold text-[#bdbdbd]">KNIFE BLK</span>
            <span id="st-block" class="text-[8px] text-gray-500">empty</span>
          </div>

          <!-- SHELF -->
          <div id="el-shelf" class="cell h-[80px] rounded-lg border-2 border-[#5a4a28] bg-[#1c1810] flex flex-col items-center justify-center">
            <div class="text-xl">📦</div>
            <span class="text-[10px] font-semibold text-[#a08060]">SHELF</span>
            <span id="st-shelf" class="text-[8px] text-gray-500">empty</span>
          </div>

        </div>

        <!-- ARM overlay — positioned on top of the acted-on element -->
        <div id="arm-marker" class="arm-marker absolute flex flex-col items-center pointer-events-none" style="left:280px; top:94px; transform:translate(-50%,-50%); z-index:50;">
          <div class="w-7 h-7 rounded-full bg-soma-danger border-2 border-white flex items-center justify-center text-white text-[10px] font-bold shadow-lg shadow-red-500/30">+</div>
          <span id="arm-carrying" class="text-[8px] text-soma-accent mt-0.5 hidden"></span>
        </div>

      </div>
    </main>

    <!-- RIGHT -->
    <aside class="w-64 bg-soma-panel border-l border-white/5 flex flex-col overflow-hidden shrink-0">
      <div class="px-4 py-2.5 border-b border-white/5 flex items-center justify-between">
        <h3 class="text-[10px] font-medium uppercase tracking-wider text-gray-500">Trace</h3>
        <span id="trace-summary" class="text-[10px] text-gray-500"></span>
      </div>
      <div class="flex-1 overflow-y-auto p-2 space-y-0.5" id="trace-steps">
        <div class="text-xs text-gray-600 text-center py-8">Press Play to run</div>
      </div>
      <div id="step-detail" class="border-t border-white/5 p-3 text-[10px] space-y-1 hidden">
        <div class="flex justify-between"><span class="text-gray-500">Skill</span><span id="detail-skill" class="text-white font-medium"></span></div>
        <div class="flex justify-between"><span class="text-gray-500">Status</span><span id="detail-status"></span></div>
        <div class="flex justify-between"><span class="text-gray-500">Step</span><span id="detail-step" class="text-gray-300"></span></div>
      </div>
    </aside>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════════
var COLORS = {
  closed: { bg: '#1c1c30', border: '#3a3a50' },
  open:   { bg: '#1a2a1a', border: '#4caf50' },
  off:    { bg: '#1c1c30', border: '#3a3a50' },
  on:     { bg: '#1a2a1a', border: '#4caf50' },
};

function setCell(id, state, label) {
  var el = document.getElementById('el-' + id);
  var st = document.getElementById('st-' + id);
  if (!el) return;
  var c = COLORS[state] || COLORS.closed;
  el.style.borderColor = c.border;
  el.style.backgroundColor = c.bg;
  if (st) st.textContent = label || state;
  el.classList.add('changed');
  setTimeout(function() { el.classList.remove('changed'); }, 500);
}

function moveArm(targetId) {
  var target = document.getElementById('el-' + targetId);
  var kitchen = document.getElementById('kitchen');
  var marker = document.getElementById('arm-marker');
  if (!target || !marker || !kitchen) return;

  var tr = target.getBoundingClientRect();
  var kr = kitchen.getBoundingClientRect();
  marker.style.left = (tr.left + tr.width / 2 - kr.left) + 'px';
  marker.style.top = (tr.top + tr.height / 2 - kr.top) + 'px';
  marker.style.transform = 'translate(-50%,-50%)';
}

function moveArmToPos() {
  moveArm('board');
}

function togglePreview(id) {
  var st = document.getElementById('st-' + id);
  if (!st) return;
  var cur = st.textContent;
  if (cur === 'closed') setCell(id, 'open', 'open');
  else if (cur === 'open') setCell(id, 'closed', 'closed');
  else if (cur === 'off') setCell(id, 'on', 'ON');
  else if (cur === 'ON') setCell(id, 'off', 'off');
}

function updateState(obs) {
  if (!obs) {
    setCell('window', 'closed'); setCell('cabinet', 'closed');
    setCell('drawer', 'closed'); setCell('processor', 'off'); setCell('block', 'closed', 'empty');
    setCell('board', 'closed', 'on counter'); setCell('jar', 'closed', 'on counter');
    setCell('shelf', 'closed', 'empty');
    document.getElementById('arm-carrying').classList.add('hidden');
    return;
  }

  setCell('window', obs.window_open ? 'open' : 'closed');
  setCell('cabinet', obs.cabinet_open ? 'open' : 'closed');
  setCell('drawer', obs.drawer_open ? 'open' : 'closed');
  setCell('processor', obs.processor_on ? 'on' : 'off', obs.processor_on ? 'ON' : 'off');
  setCell('block', obs.knife_in_block ? 'on' : 'off', obs.knife_in_block ? 'inserted' : 'empty');

  var carry = document.getElementById('arm-carrying');
  if (obs.carrying) {
    carry.textContent = obs.carrying.kind.replace(/_/g, ' ');
    carry.classList.remove('hidden');
  } else {
    carry.classList.add('hidden');
  }

  if (obs.items) {
    var boardEl = document.getElementById('el-board');
    var jarEl = document.getElementById('el-jar');
    var hasBoard = obs.items.some(function(i) { return i.kind === 'cutting_board'; });
    var hasJar = obs.items.some(function(i) { return i.kind === 'spice_jar'; });
    boardEl.style.opacity = hasBoard ? '1' : '0.3';
    jarEl.style.opacity = hasJar ? '1' : '0.3';

    var shelfSt = document.getElementById('st-shelf');
    var onShelf = obs.items.filter(function(i) { return i.on_shelf; });
    shelfSt.textContent = onShelf.length > 0 ? onShelf.map(function(i) { return i.kind.replace(/_/g,' '); }).join(', ') : '';
  }
}

// ═══════════════════════════════════════════════════
//  Skill → target element mapping (for arm animation)
// ═══════════════════════════════════════════════════
var SKILL_TARGET = {
  'kitchen.scan': null,
  'kitchen.push_board': 'board',
  'kitchen.pick_jar': 'jar',
  'kitchen.place_shelf': 'shelf',
  'kitchen.place_counter': 'board',
  'kitchen.door_open': 'cabinet',
  'kitchen.door_close': 'cabinet',
  'kitchen.drawer_open': 'drawer',
  'kitchen.drawer_close': 'drawer',
  'kitchen.button_press': 'processor',
  'kitchen.peg_insert': 'block',
  'kitchen.pick_knife': 'block',
  'kitchen.window_open': 'window',
  'kitchen.window_close': 'window',
};

// ═══════════════════════════════════════════════════
//  ML10 Tasks
// ═══════════════════════════════════════════════════
var ML10 = [
  { id: 'reach', label: 'reach' }, { id: 'push', label: 'push' },
  { id: 'pick_place', label: 'pick-place' }, { id: 'door_open', label: 'door-open' },
  { id: 'drawer_close', label: 'drawer-close' }, { id: 'drawer_open', label: 'drawer-open' },
  { id: 'button_press', label: 'button-press' }, { id: 'peg_insert', label: 'peg-insert' },
  { id: 'window_open', label: 'window-open' }, { id: 'window_close', label: 'window-close' },
];
var SKILL_TASK = {
  'kitchen.scan':'reach','kitchen.push_board':'push',
  'kitchen.pick_jar':'pick_place','kitchen.place_shelf':'pick_place',
  'kitchen.place_counter':'pick_place','kitchen.door_open':'door_open','kitchen.door_close':'door_open',
  'kitchen.drawer_close':'drawer_close','kitchen.drawer_open':'drawer_open',
  'kitchen.button_press':'button_press','kitchen.peg_insert':'peg_insert',
  'kitchen.window_open':'window_open','kitchen.window_close':'window_close',
};

(function() {
  var grid = document.getElementById('tasks-grid');
  ML10.forEach(function(t) {
    var el = document.createElement('div');
    el.dataset.task = t.id;
    el.className = 'flex items-center gap-2 px-2 py-1 rounded text-[11px] bg-soma-surface transition-colors';
    var dot = document.createElement('span');
    dot.className = 'task-dot w-1.5 h-1.5 rounded-full bg-gray-600 shrink-0';
    el.appendChild(dot);
    var lbl = document.createElement('span');
    lbl.textContent = t.label;
    el.appendChild(lbl);
    grid.appendChild(el);
  });
})();

function updateTasks(done) {
  document.querySelectorAll('[data-task]').forEach(function(el) {
    var d = done && done.indexOf(el.dataset.task) >= 0;
    el.classList.toggle('bg-soma-ok/20', d);
    el.classList.toggle('bg-soma-surface', !d);
    var dot = el.querySelector('.task-dot');
    dot.classList.toggle('bg-soma-ok', d);
    dot.classList.toggle('bg-gray-600', !d);
  });
}

// ═══════════════════════════════════════════════════
//  Trace & Playback
// ═══════════════════════════════════════════════════
var traceData = null;
var animStep = -1;
var playTimer = null;

function setStatus(text, cls) {
  var el = document.getElementById('header-status');
  el.textContent = text;
  el.className = 'text-xs ' + (cls === 'solved' ? 'text-soma-ok' : cls === 'failed' ? 'text-soma-danger' : cls === 'running' ? 'text-soma-accent' : 'text-gray-500');
}

function buildTrace(steps) {
  var c = document.getElementById('trace-steps');
  while (c.firstChild) c.removeChild(c.firstChild);
  steps.forEach(function(step, i) {
    var el = document.createElement('div');
    el.className = 'flex items-center gap-2 px-2 py-1.5 rounded cursor-pointer hover:bg-white/5 group';
    var num = document.createElement('span');
    num.className = 'w-5 h-5 rounded flex items-center justify-center text-[10px] font-semibold shrink-0 ' +
      (step.success ? 'bg-soma-ok/20 text-soma-ok' : 'bg-soma-danger/20 text-soma-danger');
    num.textContent = i + 1;
    el.appendChild(num);
    var name = document.createElement('span');
    name.className = 'text-[11px] text-gray-300 group-hover:text-white truncate';
    name.textContent = step.skill.replace('kitchen.', '');
    el.appendChild(name);
    var ml = SKILL_TASK[step.skill];
    if (ml) {
      var badge = document.createElement('span');
      badge.className = 'ml-auto text-[9px] px-1 py-0.5 rounded bg-white/5 text-gray-500 shrink-0';
      badge.textContent = ml.replace('_', '-');
      el.appendChild(badge);
    }
    (function(idx) { el.addEventListener('click', function() { showStep(idx); }); })(i);
    c.appendChild(el);
  });
  document.getElementById('trace-summary').textContent = steps.length + ' steps';
}

function showStep(idx) {
  if (!traceData || !traceData.steps[idx]) return;
  animStep = idx;
  var step = traceData.steps[idx];
  var obs = step.observation;

  var c = document.getElementById('trace-steps');
  Array.from(c.children).forEach(function(el, i) {
    el.classList.toggle('bg-soma-accent/10', i === idx);
    el.classList.toggle('ring-1', i === idx);
    el.classList.toggle('ring-soma-accent/30', i === idx);
  });

  // Move arm to target element
  var target = SKILL_TARGET[step.skill];
  if (target) {
    moveArm(target);
  } else if (obs && obs.arm_pos) {
    moveArmToPos(obs.arm_pos[0], obs.arm_pos[1]);
  }

  if (obs) {
    updateState(obs);
    if (obs.tasks_done) updateTasks(obs.tasks_done);
  }

  document.getElementById('step-detail').classList.remove('hidden');
  document.getElementById('detail-skill').textContent = step.skill.replace('kitchen.', '');
  var ds = document.getElementById('detail-status');
  ds.textContent = step.success ? 'Success' : 'Failed';
  ds.className = step.success ? 'font-medium text-soma-ok' : 'font-medium text-soma-danger';
  document.getElementById('detail-step').textContent = (idx + 1) + ' / ' + traceData.steps.length;

  var active = c.children[idx];
  if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function startPlay() {
  if (!traceData || !traceData.steps.length) return;
  animStep = -1;
  var speed = parseInt(document.getElementById('speed').value);
  var delay = 1400 - speed * 110;
  playTimer = setInterval(function() {
    animStep++;
    if (animStep >= traceData.steps.length) { stopPlay(); return; }
    showStep(animStep);
  }, delay);
}

function stopPlay() {
  if (playTimer) { clearInterval(playTimer); playTimer = null; }
}

async function runScenario() {
  var btn = document.getElementById('btn-play');
  btn.disabled = true;
  setStatus('Running SOMA...', 'running');
  stopPlay();
  traceData = null;
  updateState(null);
  try {
    var res = await fetch('/api/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: 'kitchen_run', description: 'Web editor run', preset: 'organize',
        seed: parseInt(document.getElementById('seed').value) || 42,
      }),
    });
    var data = await res.json();
    if (data.error) { setStatus('Error: ' + data.error, 'failed'); return; }
    traceData = data;
    var s = data.solved ? 'SOLVED' : 'FAILED';
    var p = data.plan_following ? ' [PLAN]' : '';
    setStatus(s + ' in ' + data.step_count + ' steps' + p, data.solved ? 'solved' : 'failed');
    buildTrace(data.steps);
    startPlay();
  } catch (err) {
    setStatus('Error: ' + err.message, 'failed');
  } finally {
    btn.disabled = false;
  }
}

async function flushMemory() {
  if (!confirm('Clear all learned state?')) return;
  try {
    var res = await fetch('/api/flush-memory', { method: 'POST' });
    var data = await res.json();
    setStatus('Flushed ' + data.deleted + ' file(s)', '');
  } catch (err) {
    setStatus('Flush error: ' + err.message, 'failed');
  }
}

document.getElementById('speed').addEventListener('input', function(e) {
  document.getElementById('speed-label').textContent = e.target.value;
  if (playTimer) { stopPlay(); startPlay(); }
});
</script>
</body>
</html>
