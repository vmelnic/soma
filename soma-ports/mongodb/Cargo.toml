[package]
name = "soma-port-mongodb"
version = "0.1.0"
edition = "2024"
description = "SOMA port pack for MongoDB document database operations"

[lib]
crate-type = ["cdylib"]

[dependencies]
soma-port-sdk = { path = "../sdk" }
mongodb = { version = "3", features = ["sync"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
chrono = "0.4"
