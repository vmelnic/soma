[package]
name = "soma-port-push"
version = "0.1.0"
edition = "2024"
description = "SOMA port pack: push notifications (FCM, WebPush, device registration)"

[lib]
crate-type = ["cdylib"]

[dependencies]
soma-port-sdk = { path = "../sdk" }
reqwest = { version = "0.12", features = ["json", "blocking"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
