[package]
name = "soma-port-slack"
version = "0.1.0"
edition = "2024"
description = "SOMA port pack: Slack messaging (messages, channels, files, reactions)"

[lib]
crate-type = ["cdylib"]

[dependencies]
soma-port-sdk = { path = "../sdk" }
reqwest = { version = "0.12", features = ["json", "blocking"] }
serde_json = "1"
