[package]
name = "soma-port-sqlite"
version = "0.1.0"
edition = "2024"
description = "SOMA port for SQLite local database operations"

[lib]
crate-type = ["cdylib"]

[dependencies]
soma-port-sdk = { path = "../sdk" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
semver = { version = "1", features = ["serde"] }
rusqlite = { version = "0.39", features = ["bundled"] }

