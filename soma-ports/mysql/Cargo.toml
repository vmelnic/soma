[package]
name = "soma-port-mysql"
version = "0.1.0"
edition = "2024"
description = "SOMA port pack for MySQL database operations"

[lib]
crate-type = ["cdylib"]

[dependencies]
soma-port-sdk = { path = "../sdk" }
mysql = "25"
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
chrono = "0.4"
