[package]
name = "soma-port-s3"
version = "0.1.0"
edition = "2024"
description = "SOMA port pack: S3-compatible object storage (put, get, delete, presign, list)"

[lib]
crate-type = ["cdylib"]

[dependencies]
soma-port-sdk = { path = "../sdk" }
aws-sdk-s3 = "1"
aws-config = "1"
base64 = "0.22"
tokio = { version = "1", features = ["rt-multi-thread"] }
serde_json = "1"
