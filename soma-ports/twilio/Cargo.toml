[package]
name = "soma-port-twilio"
version = "0.1.0"
edition = "2024"
description = "SOMA port pack: Twilio communications (SMS, WhatsApp, voice calls)"

[lib]
crate-type = ["cdylib"]

[dependencies]
soma-port-sdk = { path = "../sdk" }
reqwest = { version = "0.12", features = ["blocking"] }
serde_json = "1"
base64 = "0.22"
