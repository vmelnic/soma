[package]
name = "soma-port-smtp"
version = "0.1.0"
edition = "2024"
description = "SOMA port pack: SMTP email delivery (plain text, HTML, attachments)"

[lib]
crate-type = ["cdylib"]

[dependencies]
soma-port-sdk = { path = "../sdk" }
lettre = { version = "0.11", default-features = false, features = ["tokio1-rustls-tls", "builder", "smtp-transport", "hostname"] }
base64 = "0.22"
tokio = { version = "1", features = ["rt-multi-thread"] }
serde_json = "1"
