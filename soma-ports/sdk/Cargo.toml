[package]
name = "soma-port-sdk"
version = "0.1.0"
edition = "2024"
description = "Shared types and Port trait for building external SOMA port packs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
semver = { version = "1", features = ["serde"] }
thiserror = "2"
