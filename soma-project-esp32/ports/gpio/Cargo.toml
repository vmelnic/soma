[package]
name = "soma-esp32-port-gpio"
version = "0.1.0"
edition = "2021"

[lib]
name = "soma_esp32_port_gpio"
crate-type = ["rlib"]

[dependencies]
soma-esp32-leaf = { path = "../../leaf" }
serde_json = { version = "1", default-features = false, features = ["alloc"] }
# Chip feature is selected by the firmware crate, not here. Library crates
# stay chip-agnostic so the same port can build for any esp-hal target.
esp-hal = { version = "0.23" }
