# Cargo config overlay for ESP32-S3 (Xtensa LX7) builds.
#
# Apply with:
#   cargo +esp build --release --config firmware/chips/esp32s3.toml \
#       --no-default-features --features "chip-esp32s3 gpio delay uart i2c spi adc pwm storage thermistor" \
#       -p soma-esp32-firmware
#
# This file is identical to the defaults in firmware/.cargo/config.toml — it
# exists so the per-chip build invocations are symmetric (one --config flag
# per chip). Edit the runner port to match your S3 dev board's serial device.

[build]
target = "xtensa-esp32s3-none-elf"

[target.xtensa-esp32s3-none-elf]
runner = "espflash flash --monitor --port /dev/cu.usbserial-1120"
rustflags = [
  "-C", "link-arg=-Tlinkall.x",
  "-C", "force-frame-pointers",
]

[unstable]
build-std = ["core", "alloc"]
